<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Select Passkey</title>
  <link rel="stylesheet" href="selector.css" />
</head>
<body>

  <div class="header">
    <div class="header-title">
      <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="8" cy="15" r="4"/>
        <path d="M12 15h9M17 12v6M21 15h-3"/>
      </svg>
      <span>Select Passkey</span>
    </div>
  </div>

  <div id="rpBanner" class="rp-banner hidden">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <span id="rpId"></span>
  </div>

  <div class="list-label">Choose a passkey to authenticate with:</div>

  <div id="credList" class="cred-list">
    <div class="empty-state">Loading…</div>
  </div>

  <div class="footer">
    <button id="cancelBtn" class="btn btn-ghost">Cancel</button>
  </div>

  <script src="selector.js"></script>
</body>
</html>
