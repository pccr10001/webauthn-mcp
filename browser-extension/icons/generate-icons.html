<!DOCTYPE html>
<!--
  Open this file in a browser, then right-click each canvas and
  "Save image as..." to get icon16.png, icon48.png, icon128.png
  OR click the auto-download buttons below.
-->
<html>
<body style="background:#0f1117;padding:20px;font-family:sans-serif;color:#dde1ea">
<h3>WebAuthn Proxy — Icon Generator</h3>
<p style="margin:8px 0 16px;color:#5c6480">Click "Download all" to save the three PNG icons.</p>

<canvas id="c16"  width="16"  height="16"  style="margin:4px;border:1px solid #333"></canvas>
<canvas id="c48"  width="48"  height="48"  style="margin:4px;border:1px solid #333"></canvas>
<canvas id="c128" width="128" height="128" style="margin:4px;border:1px solid #333"></canvas>

<br><br>
<button onclick="downloadAll()" style="padding:8px 20px;background:#4a4de8;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px">
  Download all icons
</button>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const cx = s / 2, cy = s / 2;

  // Background circle
  ctx.fillStyle = '#1a1f30';
  ctx.beginPath();
  ctx.arc(cx, cy, s * 0.48, 0, Math.PI * 2);
  ctx.fill();

  // Shield shape
  ctx.fillStyle = '#4a4de8';
  ctx.beginPath();
  const sh = s * 0.62;
  const sw = s * 0.50;
  const sx = cx - sw / 2;
  const sy = cy - sh / 2 - s * 0.02;
  // Top arc
  ctx.moveTo(sx, sy + sh * 0.22);
  ctx.lineTo(cx, sy);
  ctx.lineTo(sx + sw, sy + sh * 0.22);
  ctx.lineTo(sx + sw, sy + sh * 0.55);
  ctx.quadraticCurveTo(cx, sy + sh * 1.02, sx, sy + sh * 0.55);
  ctx.closePath();
  ctx.fill();

  // Lock body (white)
  ctx.fillStyle = '#fff';
  const lw = s * 0.18;
  const lh = s * 0.16;
  const lx = cx - lw / 2;
  const ly = cy - s * 0.01;
  const r = s * 0.025;
  ctx.beginPath();
  ctx.roundRect(lx, ly, lw, lh, r);
  ctx.fill();

  // Lock shackle
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = s * 0.065;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, ly, lw * 0.32, Math.PI, 0);
  ctx.stroke();
}

['c16','c48','c128'].forEach(id => drawIcon(document.getElementById(id)));

function downloadAll() {
  const sizes = [{id:'c16',name:'icon16.png'},{id:'c48',name:'icon48.png'},{id:'c128',name:'icon128.png'}];
  for (const {id, name} of sizes) {
    const a = document.createElement('a');
    a.href = document.getElementById(id).toDataURL('image/png');
    a.download = name;
    a.click();
  }
}
</script>
</body>
</html>
