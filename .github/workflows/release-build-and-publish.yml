name: Release Build and Publish

on:
  workflow_dispatch:
    inputs:
      push_latest:
        description: Also push ghcr latest tag
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  APP_NAME: webauthn-mcp
  GO_VERSION: 1.23.x

jobs:
  build-binaries:
    name: Build binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          mkdir -p dist
          OUTPUT_NAME="${APP_NAME}_${GOOS}_${GOARCH}${EXT}"
          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags="-s -w" -o "dist/${OUTPUT_NAME}" .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ env.APP_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  upload-release-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          merge-multiple: true
          path: release-assets

      - name: Add docker-compose file
        shell: bash
        run: |
          set -euo pipefail
          cp docker-compose.yml release-assets/docker-compose.yml

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ github.ref_name }}" release-assets/* --clobber

  push-ghcr:
    name: Build and push GHCR image
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image tags
        id: image_tags
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="ghcr.io/${{ github.repository }}"
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${{ github.ref_name }}"
            if [ "${{ inputs.push_latest }}" = "true" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
