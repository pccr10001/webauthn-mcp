services:
  webauthn-mcp:
    build: .
    container_name: webauthn-mcp
    ports:
      - "8080:8080"
    environment:
      WEBAUTHN_MCP_SERVER_PORT: "8080"
      WEBAUTHN_MCP_STORAGE_PATH: "/data/tokens"
      WEBAUTHN_MCP_API_KEY: ""
    volumes:
      - ./tokens:/data/tokens
    restart: unless-stopped